name: CI

on:
    push:
        branches: [main]
        paths-ignore:
            - 'docs/**'
            - '**/*.md'
            - 'README.md'
            - 'CHANGELOG.md'
            - 'SECURITY.md'
            - 'LICENSE'
            - '.gitignore'
            - '.gitattributes'
            - '.editorconfig'
    pull_request:
        branches: [main]
        paths-ignore:
            - 'docs/**'
            - '**/*.md'
            - 'README.md'
            - 'CHANGELOG.md'
            - 'SECURITY.md'
            - 'LICENSE'
            - '.gitignore'
            - '.gitattributes'
            - '.editorconfig'
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    build:
        name: Build and test
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup .NET
              uses: actions/setup-dotnet@v5
              with:
                  global-json-file: global.json
                  cache: true
                  cache-dependency-path: |
                      **/*.csproj
                      Directory.Build.props

            - name: Restore
              run: dotnet restore

            - name: Build
              run: dotnet build --configuration Release --no-restore

            - name: Test
              run: dotnet test --configuration Release --no-build

            - name: Pack
              run: dotnet pack --configuration Release --no-build
